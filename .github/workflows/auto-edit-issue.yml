name: Auto-Edit Issue Property

on:
  issues:
    types: [opened]

jobs:
  wrap-property:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Wrap Property X in HTML Tags
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            let body = issue.body;

            if (!body) {
              console.log("Issue body is empty.");
              return;
            }

            // 1. Sanitize Windows line endings (\r\n) to standard unix (\n)
            body = body.replace(/\r\n/g, '\n');

            // 2. Double-check your exact heading casing/spelling from your form template!
            const targetHeading = "### Property X"; 

            // 3. Updated regex that is more forgiving with trailing spaces
            const regex = new RegExp(`(${targetHeading}\\s*\\n\\s*)(.+)`);

            if (regex.test(body)) {
              console.log("Match found! Updating body...");
              
              // 4. Perform the actual replacement wrapping $2
              body = body.replace(regex, '$1<--property-->$2<--end-property-->');

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: body
              });
            } else {
              console.log(`Could not find the heading "${targetHeading}" followed by a value.`);
              console.log("This is what the workflow actually received:\n", body);
            }
